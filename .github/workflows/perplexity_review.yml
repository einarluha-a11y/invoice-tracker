name: Perplexity Review

on:
  push:
    branches: [main]
    paths:
      - '_agents/pipeline/SOLUTION.md'

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'perplexity:') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Review with Perplexity API
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python3 .github/scripts/perplexity_review.py

      - name: Commit and push REVIEW.md
        run: |
          git config user.name "perplexity-bot"
          git config user.email "perplexity-bot@users.noreply.github.com"
          git add _agents/pipeline/REVIEW.md
          git diff --staged --quiet && echo "No changes" && exit 0
          PHASE=$(grep -oE '^PHASE:[[:space:]]*[A-Za-z]+' _agents/pipeline/SOLUTION.md | head -1 | awk '{print $2}')
          ROUND=$(grep -oE '^ROUND:[[:space:]]*[0-9]+' _agents/pipeline/SOLUTION.md | head -1 | awk '{print $2}')
          git commit -m "perplexity: review ${PHASE:-unknown} round ${ROUND:-1}"
          git push
