name: Perplexity Review

on:
  push:
    branches: [main]
    paths:
      - '_agents/pipeline/SOLUTION.md'

permissions:
  contents: write

concurrency:
  group: perplexity-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'perplexity:') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Review with Perplexity API
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python3 .github/scripts/perplexity_review.py

      - name: Commit and push changes
        run: |
          git config user.name "perplexity-bot"
          git config user.email "perplexity-bot@users.noreply.github.com"

          # Save Perplexity output before pulling
          cp _agents/pipeline/REVIEW.md /tmp/REVIEW.md.bak
          cp _agents/pipeline/SOLUTION.md /tmp/SOLUTION.md.bak

          # Pull latest, discard any local state
          git checkout -- .
          git pull --ff-only origin main || git pull origin main --no-edit -X ours || true

          # Restore Perplexity output (overwrite whatever came from remote)
          cp /tmp/REVIEW.md.bak _agents/pipeline/REVIEW.md
          cp /tmp/SOLUTION.md.bak _agents/pipeline/SOLUTION.md

          # Safety: remove any conflict markers that may have leaked
          sed -i '/^<<<<<<</d; /^>>>>>>>/d; /^=======/d' _agents/pipeline/SOLUTION.md
          sed -i '/^<<<<<<</d; /^>>>>>>>/d; /^=======/d' _agents/pipeline/REVIEW.md

          git add _agents/pipeline/REVIEW.md _agents/pipeline/SOLUTION.md
          git diff --staged --quiet && echo "No changes" && exit 0
          PHASE=$(grep -oE '^PHASE:[[:space:]]*[A-Za-z]+' _agents/pipeline/SOLUTION.md | head -1 | awk '{print $2}')
          ROUND=$(grep -oE '^ROUND:[[:space:]]*[0-9]+' _agents/pipeline/SOLUTION.md | head -1 | awk '{print $2}')
          git commit -m "perplexity: review ${PHASE:-unknown} round ${ROUND:-1} + next task"

          # Push with retry — auto-resolve conflicts favoring our version
          for i in 1 2 3; do
            git push origin main && break
            echo "Push attempt $i failed, pulling with ours strategy..."
            git pull --rebase -X theirs origin main || {
              git rebase --abort || true
              git pull origin main --no-edit -X ours || true
            }
          done
