name: Perplexity Review

# Автоматическое ревью решений от Claude через Perplexity API
# Триггер: push в main с изменением SOLUTION.md
# Результат: записывает REVIEW.md и коммитит обратно

on:
  push:
    branches: [main]
    paths:
      - '_agents/pipeline/SOLUTION.md'

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Пропускаем если коммит от самого бота (чтобы избежать петли)
    if: "!contains(github.event.head_commit.message, 'perplexity:')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Review with Perplexity API
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          set -e

          SOLUTION=$(cat _agents/pipeline/SOLUTION.md)
          CHARTER=$(cat _agents/workflows/chief_accountant.md 2>/dev/null || echo "")
          CLAUDE_MD=$(cat CLAUDE.md 2>/dev/null || echo "")

          # Определяем фазу из SOLUTION.md
          PHASE=$(echo "$SOLUTION" | grep -oE '^PHASE:\s*\w+' | head -1 | awk '{print $2}')
          ROUND=$(echo "$SOLUTION" | grep -oE '^ROUND:\s*[0-9]+' | head -1 | awk '{print $2}')
          PHASE=${PHASE:-UNKNOWN}
          ROUND=${ROUND:-1}

          echo "Phase: $PHASE, Round: $ROUND"

          # Системный промпт в зависимости от фазы
          if [ "$PHASE" = "ARCHITECTURE" ]; then
            SYSTEM_PROMPT="Ты — независимый технический ревьюер проекта Invoice-Tracker (Node.js CJS backend, React/Vite frontend, Firebase/Firestore, PM2, Railway). Критически оцени архитектурное решение. Проверь: соответствие Chief Accountant Charter, отсутствие противоречий с существующей архитектурой, полноту (edge cases), потенциальные баги. Отвечай СТРОГО в формате:\nВЕРДИКТ: APPROVED или CHANGES_NEEDED\nОЦЕНКА: [1-3 предложения что хорошо]\nЗАМЕЧАНИЯ: [нумерованный список если CHANGES_NEEDED, пусто если APPROVED]"
          elif [ "$PHASE" = "CODE" ]; then
            SYSTEM_PROMPT="Ты — code reviewer Invoice-Tracker. Проверь: протоколы Chief Accountant Charter (PM2 restart после automation/, parseNumGlobal для сумм, anti-hallucination, idempotency), синтаксические ошибки, полноту, безопасность. Отвечай СТРОГО:\nВЕРДИКТ: CODE_APPROVED или CODE_CHANGES_NEEDED\nОЦЕНКА: [что реализовано правильно]\nПРОБЛЕМЫ: [нумерованный список с файл:строка]"
          else
            SYSTEM_PROMPT="Ты — независимый ревьюер Invoice-Tracker. Проанализируй решение и ответь в формате: ВЕРДИКТ + ОЦЕНКА + ЗАМЕЧАНИЯ."
          fi

          # Контекст проекта (обрезаем до 6000 символов)
          CONTEXT=$(printf "%s\n\n%s" "$CLAUDE_MD" "$CHARTER" | head -c 6000)
          FULL_SYSTEM="${SYSTEM_PROMPT}

Контекст проекта:
${CONTEXT}"

          # Собираем JSON payload через jq
          PAYLOAD=$(jq -n \
            --arg system "$FULL_SYSTEM" \
            --arg user "$SOLUTION" \
            '{
              model: "sonar-pro",
              messages: [
                {role: "system", content: $system},
                {role: "user", content: $user}
              ],
              max_tokens: 2048,
              temperature: 0.2
            }')

          # Вызов Perplexity API
          RESPONSE=$(curl -sS https://api.perplexity.ai/chat/completions \
            -H "Authorization: Bearer $PERPLEXITY_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # Проверяем ошибку
          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "Perplexity API error:"
            echo "$RESPONSE" | jq '.error'
            exit 1
          fi

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [ -z "$CONTENT" ]; then
            echo "Empty response from Perplexity:"
            echo "$RESPONSE"
            exit 1
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          # Записываем REVIEW.md
          cat > _agents/pipeline/REVIEW.md <<REVIEW_EOF
          # REVIEW от Perplexity — ${TIMESTAMP}
          <!-- phase: ${PHASE} | round: ${ROUND} -->

          ${CONTENT}

          ---
          *Автоматическое ревью через GitHub Actions (.github/workflows/perplexity_review.yml)*
          *Claude должен прочитать этот файл и отреагировать согласно pipeline_protocol.md*
          REVIEW_EOF

          echo "REVIEW.md generated:"
          echo "---"
          head -20 _agents/pipeline/REVIEW.md
          echo "---"

      - name: Commit and push REVIEW.md
        run: |
          git config user.name "perplexity-bot"
          git config user.email "perplexity-bot@users.noreply.github.com"
          git add _agents/pipeline/REVIEW.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            PHASE=$(grep -oE '^PHASE:\s*\w+' _agents/pipeline/SOLUTION.md | head -1 | awk '{print $2}')
            ROUND=$(grep -oE '^ROUND:\s*[0-9]+' _agents/pipeline/SOLUTION.md | head -1 | awk '{print $2}')
            git commit -m "perplexity: review ${PHASE:-unknown} round ${ROUND:-1}"
            git push
          fi
